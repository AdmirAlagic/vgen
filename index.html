<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Audio Visualizer - VGenerator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-waveform-path"></i>
                <h1>VGenerator</h1>
            </div>
            <div class="header-controls">
                <button id="fullscreen-btn" class="btn btn-icon" title="Fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Audio Upload Section -->
            <div id="upload-section" class="upload-section">
                <div class="upload-container">
                    <div class="upload-area" id="upload-area">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>Upload Your Audio</h3>
                        <p>Drag & drop an audio file or click to browse</p>
                        <p class="file-info">Supports MP3, WAV, OGG, M4A</p>
                        <input type="file" id="audio-file" accept="audio/*" hidden>
                        <button id="upload-btn" class="btn btn-primary">
                            <i class="fas fa-folder-open"></i>
                            Choose File
                        </button>
                    </div>
                </div>
            </div>

            <!-- Visualizer Section -->
            <div id="visualizer-section" class="visualizer-section" style="display: none;">
                <div class="visualizer-container">
                    <canvas id="visualizer-canvas"></canvas>
                    <div class="canvas-overlay">
                        <div class="track-info" id="track-info">
                            <h3 id="track-name">Track Name</h3>
                            <p id="track-duration">0:00 / 0:00</p>
                        </div>
                        <div class="generation-status" id="generation-status" style="display: none;">
                            <i class="fas fa-magic"></i>
                            <span>Generating Video...</span>
                        </div>
                    </div>
                </div>

                <!-- Audio Controls -->
                <div class="audio-controls">
                    <button id="play-btn" class="btn btn-icon">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="pause-btn" class="btn btn-icon" style="display: none;">
                        <i class="fas fa-pause"></i>
                    </button>
                    <button id="stop-btn" class="btn btn-icon">
                        <i class="fas fa-stop"></i>
                    </button>
                    <div class="progress-container">
                        <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100">
                    </div>
                    <div class="volume-control">
                        <i class="fas fa-volume-up"></i>
                        <input type="range" id="volume-slider" class="volume-slider" value="50" min="0" max="100">
                    </div>
                </div>
            </div>
        </main>

        <!-- Control Panel -->
        <aside class="control-panel" id="control-panel" style="display: none;">
            <div class="panel-header">
                <h3>Visualization Settings</h3>
                <button id="toggle-panel" class="btn btn-icon">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <div class="panel-content">
                <!-- Visualization Type -->
                <div class="control-group">
                    <label>Visualization Type</label>
                    <select id="viz-type" class="control-input">
                        <option value="spectrum">Spectrum Analyzer</option>
                        <option value="waveform">Waveform</option>
                        <option value="circular">Circular Spectrum</option>
                        <option value="particles">Particle System</option>
                        <option value="bars">3D Bars</option>
                    </select>
                </div>

                <!-- Color Scheme -->
                <div class="control-group">
                    <label>Color Scheme</label>
                    <select id="color-scheme" class="control-input">
                        <option value="neon">Neon</option>
                        <option value="fire">Fire</option>
                        <option value="ocean">Ocean</option>
                        <option value="sunset">Sunset</option>
                        <option value="monochrome">Monochrome</option>
                        <option value="rainbow">Rainbow</option>
                    </select>
                </div>

                <!-- Sensitivity -->
                <div class="control-group">
                    <label>Sensitivity: <span id="sensitivity-value">75</span></label>
                    <input type="range" id="sensitivity" class="control-slider" value="75" min="10" max="200" step="5">
                </div>

                <!-- Smoothing -->
                <div class="control-group">
                    <label>Smoothing: <span id="smoothing-value">60</span></label>
                    <input type="range" id="smoothing" class="control-slider" value="60" min="0" max="95" step="5">
                </div>

                <!-- Effects -->
                <div class="control-group">
                    <label>Effects</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="glow-effect" checked>
                            <span>Glow Effect</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="blur-effect">
                            <span>Motion Blur</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="particles-effect">
                            <span>Particles</span>
                        </label>
                    </div>
                </div>

                <!-- Video Generation Settings -->
                <div class="control-group">
                    <label>Video Quality</label>
                    <select id="video-quality" class="control-input">
                        <option value="1080p">1080p (YouTube Optimized)</option>
                        <option value="720p">720p</option>
                        <option value="4k">4K</option>
                    </select>
                </div>

                <!-- Generation Controls -->
                <div class="control-group">
                    <button id="generate-btn" class="btn btn-primary btn-full">
                        <i class="fas fa-magic"></i>
                        Generate Video
                    </button>
                    <button id="download-btn" class="btn btn-success btn-full" style="display: none;">
                        <i class="fas fa-download"></i>
                        Download Video
                    </button>
                    
                    <!-- Progress Bar -->
                    <div id="generation-progress" class="progress-container" style="display: none; margin-top: 1rem;">
                        <div class="progress-bar-container">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                        <div id="progress-text" class="progress-text">Preparing...</div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Audio Element -->
    <audio id="audio-element" style="display: none;"></audio>

    <!-- Scripts -->
    <script src="js/audioAnalyzer.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/videoGenerator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
