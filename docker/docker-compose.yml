version: '3.8'

services:
  # GPU-Accelerated Blender Render Workers
  blender-worker-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.blender-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../output:/app/output
      - ../input:/app/input
      - blender_cache:/app/cache
    environment:
      - WORKER_ID=1
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_JOBS=2
    depends_on:
      - redis
    networks:
      - blender-network

  blender-worker-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.blender-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../output:/app/output
      - ../input:/app/input
      - blender_cache:/app/cache
    environment:
      - WORKER_ID=2
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_JOBS=2
    depends_on:
      - redis
    networks:
      - blender-network

  blender-worker-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.blender-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../output:/app/output
      - ../input:/app/input
      - blender_cache:/app/cache
    environment:
      - WORKER_ID=3
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_JOBS=2
    depends_on:
      - redis
    networks:
      - blender-network

  blender-worker-4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.blender-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../output:/app/output
      - ../input:/app/input
      - blender_cache:/app/cache
    environment:
      - WORKER_ID=4
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_JOBS=2
    depends_on:
      - redis
    networks:
      - blender-network

  # GPU-Accelerated Audio Processor
  audio-processor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.audio-processor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../output:/app/output
      - ../input:/app/input
      - audio_cache:/app/cache
    environment:
      - REDIS_URL=redis://redis:6379
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      - redis
    networks:
      - blender-network

  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blender-network

  # Render Coordinator
  render-coordinator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coordinator
    ports:
      - "8000:8000"
    volumes:
      - ../output:/app/output
      - ../input:/app/input
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_COUNT=4
    depends_on:
      - redis
      - blender-worker-1
      - blender-worker-2
      - blender-worker-3
      - blender-worker-4
      - audio-processor
    networks:
      - blender-network

  # AI Optimization Service
  ai-optimizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-optimizer
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
    networks:
      - blender-network

volumes:
  blender_cache:
  audio_cache:
  redis_data:

networks:
  blender-network:
    driver: bridge
